<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Emerald Rogue CustomMonID Workbench</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/database.js"></script>
    <script src="js/observations.js"></script>
    <script src="js/encoder.js"></script>
    <script src="js/app.js" defer></script>

</head>

<body>

<div class="container">

    <header>

   
        <nav id="mainTabs">

            <button class="tabButton active"
            data-tab="decoder">
                Decoder
            </button>

            <button class="tabButton"
                    data-tab="research">
                Research
            </button>

        </nav>



    </header>


    <div class="grid">

        <!-- ===================================================== -->
        <!-- LEFT PANEL                                             -->
        <!-- ===================================================== -->

        <section class="card">

            <h2>Species</h2>

            <label for="speciesSearch">

                Search Species

            </label>

            <input
                id="speciesSearch"
                type="text"
                placeholder="Start typing..."
                autocomplete="off">

            <select id="speciesSelect" size="12"></select>

            <hr>

            <h2>Original Typing</h2>

            <div class="readonlyRow">

                <label>Primary</label>

                <span id="originalPrimary">
                    —
                </span>

            </div>

            <div class="readonlyRow">

                <label>Secondary</label>

                <span id="originalSecondary">
                    —
                </span>

            </div>

            <hr>

            <h2>Edit</h2>

            <label>

                <input
                    type="radio"
                    name="editedSlot"
                    value="primary"
                    checked>

                Primary Type

            </label>

            <label>

                <input
                    type="radio"
                    name="editedSlot"
                    value="secondary">

                Secondary Type

            </label>

            <hr>

            <h2>Replacement Type</h2>

            <select id="replacementType"></select>

            <label class="checkbox">

                <input
                    type="checkbox"
                    id="automaticTypeMove"
                    checked>

                Automatically select type move

            </label>

            <label>

                Variant

            </label>

            <select id="typeVariant">

                <option value="0">

                    Variant A

                </option>

                <option value="1">

                    Variant B

                </option>

            </select>

            <label>

                Type Move

            </label>

            <select id="typeMove"></select>

            <hr>

            <h2>Ability</h2>

            <select id="ability"></select>

            <hr>

            <h2>Extra Move 1</h2>

            <select id="extraMove1"></select>

            <h2>Extra Move 2</h2>

            <select id="extraMove2"></select>

        </section>



        <!-- ===================================================== -->
        <!-- RIGHT PANEL                                            -->
        <!-- ===================================================== -->

        <section class="card">

            <h2>Preview</h2>

            <table class="previewTable">

                <tr>

                    <th></th>

                    <th>Original</th>

                    <th>Result</th>

                </tr>

                <tr>

                    <td>Primary</td>

                    <td id="previewOriginalPrimary">—</td>

                    <td id="previewResultPrimary">—</td>

                </tr>

                <tr>

                    <td>Secondary</td>

                    <td id="previewOriginalSecondary">—</td>

                    <td id="previewResultSecondary">—</td>

                </tr>

            </table>

            <hr>

            <h2>Moves</h2>

            <ol id="previewMoves">

            </ol>

            <hr>

            <h2>Ability</h2>

            <p id="previewAbility">

                —

            </p>

            <hr>

            <h2>Predicted CustomMonID</h2>

            <pre id="prediction">

????????

            </pre>

            <hr>

            <h2>Decoder Status</h2>

            <table class="statusTable">

                <tr>

                    <td>Species</td>

                    <td>✔</td>

                </tr>

                <tr>

                    <td>Typing</td>

                    <td>✔</td>

                </tr>

                <tr>

                    <td>Ability</td>

                    <td>✔</td>

                </tr>

                <tr>

                    <td>Type Move</td>

                    <td>◐</td>

                </tr>

                <tr>

                    <td>Extra Move 1</td>

                    <td>◐</td>

                </tr>

                <tr>

                    <td>Extra Move 2</td>

                    <td>◐</td>

                </tr>

                <tr>

                    <td>Bit Layout</td>

                    <td>◐</td>

                </tr>

            </table>

        </section>

    </div>

</div>

</body>

</html>
